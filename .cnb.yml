# CNB 流水线配置
# 环境: python-3.12

# ── 开发环境 (VS Code) ────────────────────────────────────────────────────────
$:
  vscode:
    - runner:
        cpus: 64
      docker:
        image: docker.cnb.cool/debug.icu/dev-image/golang-1.24.0:latest
      imports:
        - https://cnb.cool/debug.icu/secrets/-/blob/main/claude.proxy.yaml
        - https://cnb.cool/debug.icu/secrets/-/blob/main/llm.yaml
      services:
        - vscode
        - docker
      stages:
        - name: Initialize Claude Code Environment
          script: |
            if [ -f "/opt/cnb/scripts/claude-restore.sh" ]; then
                bash /opt/cnb/scripts/claude-restore.sh
            else
                echo "Error: Claude restore script not found"
                exit 1
            fi

# ── Tag 事件：构建镜像 → 导出附件 → 创建 Release → 推送镜像 ─────────────────
  tag_push:
    - services:
        - docker
      stages:
        - name: Build and export Docker image
          script: |
            IMAGE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
            docker build -t "${IMAGE}:${CNB_BRANCH}" -t "${IMAGE}:latest" .
            docker save "${IMAGE}:${CNB_BRANCH}" | gzip > "metabase-mcp-${CNB_BRANCH}.tar.gz"
            ls -lh "metabase-mcp-${CNB_BRANCH}.tar.gz"

        - name: Generate release notes
          script: |
            git fetch --tags --unshallow 2>/dev/null || git fetch --tags
            PREV_TAG=$(git describe --tags --abbrev=0 "${CNB_BRANCH}^" 2>/dev/null || true)
            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..${CNB_BRANCH}"
            else
              RANGE="${CNB_BRANCH}"
            fi
            NOTES=$(git log --pretty=format:'- %s' "$RANGE" | perl -ne 'print unless $seen{$_}++')
            echo "${NOTES:-Release ${CNB_BRANCH}}" > release_notes.md

        - name: Create Release
          type: git:release
          options:
            title: ${CNB_BRANCH}
            descriptionFromFile: release_notes.md
            latest: true

        - name: Upload image artifact to Release
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - "metabase-mcp-*.tar.gz"

        - name: Push Docker image
          script: |
            IMAGE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
            docker push "${IMAGE}:${CNB_BRANCH}"
            docker push "${IMAGE}:latest"
