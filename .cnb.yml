# CNB 云原生开发环境配置

# ── 开发环境 (VS Code) ────────────────────────────────────────────────────────
$:
  vscode:
    - runner:
        cpus: 32
      docker:
        image: docker.cnb.cool/debug.icu/dev-image/golang-1.26.0:latest
      imports:
        - https://cnb.cool/debug.icu/secrets/-/blob/main/claude.proxy.yaml
        - https://cnb.cool/debug.icu/secrets/-/blob/main/llm.yaml

      services:
        - vscode
        - docker
      stages:
        - name: Initialize Claude Code Environment
          script: |
            if [ -f "/opt/cnb/scripts/claude-restore.sh" ]; then
                bash /opt/cnb/scripts/claude-restore.sh
            else
                echo "Warning: Claude restore script not found"
            fi

        - name: Export environment URIs
          script: |
            env | grep PROXY | grep URI > cnb.uri

        - name: Install dependencies
          script: |
            make install-deps

        - name: github set
          script: |
            git remote add github https://github.com/wertycn/metabase-mcp.git

# ── Tag 事件：多平台编译 → 创建 Release → 上传制品 → 构建并推送镜像 ──────────
  tag_push:
    - services:
        - docker
      stages:
        - name: Build multi-platform binaries
          image: docker.cnb.cool/debug.icu/dev-image/golang-1.26.0:latest
          script: |
            make release VERSION="${CNB_BRANCH}"

        - name: Extract release notes
          image: docker.cnb.cool/debug.icu/dev-image/golang-1.26.0:latest
          script: |
            git fetch --tags --unshallow 2>/dev/null || git fetch --tags
            PREV_TAG=$(git describe --tags --abbrev=0 "${CNB_BRANCH}^" 2>/dev/null || true)
            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..${CNB_BRANCH}"
            else
              RANGE="${CNB_BRANCH}"
            fi
            TAG_MSG=$(git log --pretty=format:'- %s' "$RANGE" | perl -ne 'print unless $seen{$_}++')
            echo "${TAG_MSG:-Release ${CNB_BRANCH}}" > release_notes.md

        - name: Create Release
          type: git:release
          options:
            title: ${CNB_BRANCH}
            descriptionFromFile: release_notes.md
            latest: true

        - name: Upload release attachments
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - "./dist/*"

        - name: Build and push Docker image
          script: |
            IMAGE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
            VERSION="${CNB_BRANCH}"

            cp "dist/metabase-mcp-${VERSION}-linux-amd64" metabase-mcp
            docker build -t "${IMAGE}:${VERSION}" -t "${IMAGE}:latest" .

            docker push "${IMAGE}:${VERSION}"
            docker push "${IMAGE}:latest"

            echo "✓ Pushed ${IMAGE}:${VERSION} and ${IMAGE}:latest"

# ── main 分支推送：测试 → 编译 → 构建镜像（不推送）─────────────────────────
main:
  push:
    - services:
        - docker
      imports:
        - https://cnb.cool/debug.icu/secrets/-/blob/main/common.yaml
      stages:
        - name: Test and build
          image: docker.cnb.cool/debug.icu/dev-image/golang-1.26.0:latest
          script: |
            make build test

        - name: Build Docker image
          script: |
            docker build -t metabase-mcp:test .
            echo "✓ Docker image built successfully (not pushed)"

        - name: sync to github
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/wertycn/metabase-mcp.git
            auth_type: https
            username: wertycn
            password: ${GH_TOKEN}
            branch: main
            push_tags: "false"
            force: "true"

