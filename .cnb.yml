# CNB 开发环境配置
# 环境: python-3.12

$:
  vscode:
    - runner:
        cpus: 64
      docker:
        image: docker.cnb.cool/debug.icu/dev-image/python-3.12:latest
      imports: 
        - https://cnb.cool/debug.icu/secrets/-/blob/main/claude.proxy.yaml
        - https://cnb.cool/debug.icu/secrets/-/blob/main/llm.yaml
      services:
        - vscode
        - docker
      stages:
        - name: Initialize Claude Code Environment
          script: |
            if [ -f "/opt/cnb/scripts/claude-restore.sh" ]; then
                bash /opt/cnb/scripts/claude-restore.sh
            else
                echo "Error: Claude restore script not found"
                exit 1
            fi

